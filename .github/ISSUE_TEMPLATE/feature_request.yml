name: 🚀 Feature Request
description: Suggest an idea or enhancement for the Sera Protocol SDK.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of the problem (e.g. "I'm frustrated when...").
      placeholder: Describe the challenge...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Describe the Solution You'd Like
      description: A clear and concise description of what you want to happen and how you envision the API.
      placeholder: |
        await client.newFeature.execute({ ... })
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe Alternatives You've Considered
      description: Any alternative solutions or workarounds you've evaluated.
      placeholder: Describe alternatives...
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other screenshots, protocol design context, or links related to this enhancement.
