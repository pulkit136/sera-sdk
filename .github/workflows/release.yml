name: Build & Release Verification

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  verify-and-build:
    name: Verify, Build, and Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Run Code Linters
        run: npm run lint

      - name: Validate TypeScript Definitions
        run: npm run typecheck

      - name: Run Unit Tests
        run: npm run test

      - name: Compile ESModules & CommonJS Targets
        run: npm run build

      - name: Compile TypeDoc API Reference
        run: npm run docs

      - name: Archive Production Bundles
        uses: actions/upload-artifact@v4
        with:
          name: dist-package
          path: dist/
          retention-days: 7

      - name: Archive API Reference Documentation
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/api/
          retention-days: 7
