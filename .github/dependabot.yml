version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      lint-and-test:
        patterns:
          - "eslint*"
          - "vitest*"
          - "prettier*"
          - "rimraf*"
          - "@types/*"
      compilers:
        patterns:
          - "typescript"
          - "tsup"
